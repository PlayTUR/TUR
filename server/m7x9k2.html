<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUR Admin Panel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
        }

        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #ff6b6b;
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9em;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a2e;
            color: #fff;
            font-size: 1em;
        }

        input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-ban {
            background: #ff4757;
            color: #fff;
        }

        .btn-ban:hover {
            background: #ff6b81;
        }

        .btn-unban {
            background: #2ed573;
            color: #fff;
        }

        .btn-unban:hover {
            background: #7bed9f;
        }

        .btn-refresh {
            background: #3742fa;
            color: #fff;
        }

        .btn-refresh:hover {
            background: #5352ed;
        }

        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
        }

        .result.success {
            background: rgba(46, 213, 115, 0.2);
            border: 1px solid #2ed573;
        }

        .result.error {
            background: rgba(255, 71, 87, 0.2);
            border: 1px solid #ff4757;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            background: rgba(0, 0, 0, 0.3);
            color: #00d4ff;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }

        .tag-perm {
            background: #ff4757;
        }

        .tag-temp {
            background: #ffa502;
            color: #000;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎮 TUR Admin Panel</h1>

        <!-- Admin Key -->
        <div class="panel">
            <div class="form-group">
                <label>Admin Key (required for all actions)</label>
                <input type="password" id="adminKey" placeholder="Enter admin key..." value="">
            </div>
        </div>

        <!-- Ban User -->
        <div class="panel">
            <h2>🔨 Ban User</h2>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="banUsername" placeholder="Username to ban">
            </div>
            <div class="form-group">
                <label>IP Address (optional)</label>
                <input type="text" id="banIp" placeholder="IP to ban (optional)">
            </div>
            <div class="form-group">
                <label>Reason</label>
                <input type="text" id="banReason" placeholder="Reason for ban" value="Violation of terms">
            </div>
            <div class="form-group">
                <label>Duration</label>
                <select id="banDuration">
                    <option value="">Permanent</option>
                    <option value="1">1 day</option>
                    <option value="3">3 days</option>
                    <option value="7">7 days</option>
                    <option value="30">30 days</option>
                    <option value="90">90 days</option>
                    <option value="365">1 year</option>
                </select>
            </div>
            <button class="btn-ban" onclick="banUser()">Ban User</button>
            <div id="banResult" class="result hidden"></div>
        </div>

        <!-- Unban User -->
        <div class="panel">
            <h2>✅ Unban User</h2>
            <div class="form-group">
                <label>Username or IP</label>
                <input type="text" id="unbanTarget" placeholder="Username or IP to unban">
            </div>
            <button class="btn-unban" onclick="unbanUser()">Unban</button>
            <div id="unbanResult" class="result hidden"></div>
        </div>

        <!-- Ban List -->
        <div class="panel">
            <h2>📋 Active Bans</h2>
            <button class="btn-refresh" onclick="loadBans()">Refresh Ban List</button>
            <div id="bansResult" class="result hidden"></div>
            <table id="bansTable" class="hidden">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>IP</th>
                        <th>Reason</th>
                        <th>Expires</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="bansBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://154.53.35.148:8080';

        function getAdminKey() {
            return document.getElementById('adminKey').value;
        }

        function showResult(elementId, message, isError) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = 'result ' + (isError ? 'error' : 'success');
            el.classList.remove('hidden');
        }

        async function banUser() {
            const adminKey = getAdminKey();
            if (!adminKey) { alert('Enter admin key'); return; }

            const username = document.getElementById('banUsername').value;
            const ip = document.getElementById('banIp').value;
            const reason = document.getElementById('banReason').value;
            const duration = document.getElementById('banDuration').value;

            if (!username && !ip) { alert('Enter username or IP'); return; }

            try {
                const res = await fetch(`${API_URL}/api/v2/internal/mod/r`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        admin_key: adminKey,
                        username: username || null,
                        ip: ip || null,
                        reason: reason,
                        duration_days: duration ? parseInt(duration) : null
                    })
                });
                const data = await res.json();
                showResult('banResult', JSON.stringify(data, null, 2), !res.ok);
                if (res.ok) loadBans();
            } catch (e) {
                showResult('banResult', 'Error: ' + e.message, true);
            }
        }

        async function unbanUser() {
            const adminKey = getAdminKey();
            if (!adminKey) { alert('Enter admin key'); return; }

            const target = document.getElementById('unbanTarget').value;
            if (!target) { alert('Enter username or IP'); return; }

            const isIp = /^\d+\.\d+\.\d+\.\d+$/.test(target);

            try {
                const res = await fetch(`${API_URL}/api/v2/internal/mod/u`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        admin_key: adminKey,
                        username: isIp ? null : target,
                        ip: isIp ? target : null
                    })
                });
                const data = await res.json();
                showResult('unbanResult', JSON.stringify(data, null, 2), !res.ok);
                if (res.ok) loadBans();
            } catch (e) {
                showResult('unbanResult', 'Error: ' + e.message, true);
            }
        }

        async function loadBans() {
            const adminKey = getAdminKey();
            if (!adminKey) { alert('Enter admin key'); return; }

            try {
                const res = await fetch(`${API_URL}/api/v2/internal/mod/l?admin_key=${encodeURIComponent(adminKey)}`);
                const data = await res.json();

                if (!res.ok) {
                    showResult('bansResult', JSON.stringify(data), true);
                    return;
                }

                document.getElementById('bansResult').classList.add('hidden');
                const table = document.getElementById('bansTable');
                const tbody = document.getElementById('bansBody');
                tbody.innerHTML = '';

                if (data.bans.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;">No active bans</td></tr>';
                } else {
                    data.bans.forEach(ban => {
                        const expStr = ban.expires
                            ? new Date(ban.expires * 1000).toLocaleDateString()
                            : '<span class="tag tag-perm">Permanent</span>';
                        tbody.innerHTML += `
                            <tr>
                                <td>${ban.username || '-'}</td>
                                <td>${ban.ip || '-'}</td>
                                <td>${ban.reason}</td>
                                <td>${expStr}</td>
                                <td><button class="btn-unban" style="padding:5px 10px;font-size:0.8em;" 
                                    onclick="quickUnban('${ban.username}', '${ban.ip}')">Unban</button></td>
                            </tr>
                        `;
                    });
                }
                table.classList.remove('hidden');
            } catch (e) {
                showResult('bansResult', 'Error: ' + e.message, true);
            }
        }

        async function quickUnban(username, ip) {
            const adminKey = getAdminKey();
            if (!adminKey) { alert('Enter admin key'); return; }

            try {
                await fetch(`${API_URL}/api/v2/internal/mod/u`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        admin_key: adminKey,
                        username: username !== 'null' ? username : null,
                        ip: ip !== 'null' ? ip : null
                    })
                });
                loadBans();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }
    </script>
</body>

</html>
