name: Build Game

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Write build version
      run: |
        $timestamp = Get-Date -Format "o"
        $commit = "${{ github.sha }}".Substring(0,7)
        @"
        {
          "build_time": "$timestamp",
          "commit": "$commit",
          "run_id": "${{ github.run_id }}"
        }
        "@ | Out-File -FilePath .build_version -Encoding utf8
      shell: pwsh
    
    - name: Create songs directory
      run: if (-not (Test-Path -Path songs)) { New-Item -Path songs -ItemType Directory }

    - name: Build executable
      run: pyinstaller TUR.spec
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TUR-Windows
        path: dist/TUR
        retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-mixer-dev libsdl2-image-dev libsdl2-ttf-dev
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Write build version
      run: |
        echo "{\"build_time\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"commit\": \"${GITHUB_SHA:0:7}\", \"run_id\": \"${{ github.run_id }}\"}" > .build_version
    
    - name: Create songs directory
      run: mkdir -p songs

    - name: Build executable
      run: pyinstaller TUR.spec
    
    - name: Make executable
      run: chmod +x dist/TUR
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TUR-Linux
        path: dist/TUR
        retention-days: 30
