<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUR - ROOT ACCESS</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #050505;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .status-bar {
            border-bottom: 2px solid var(--color-error);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .crt-overlay {
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="crt-overlay"></div>
    <div class="scanline"></div>
    <div class="bg-grid"></div>

    <div class="admin-container">
        <div class="status-bar">
            <h1 style="color: var(--color-error); margin: 0;">ROOT_TERMINAL // V.1.0</h1>
            <div>
                <span id="admin-user" style="color: var(--color-primary);">GUEST</span>
                <button class="btn btn-secondary" onclick="AdminApp.logout()"
                    style="margin-left: 1rem; padding: 0.2rem 1rem;">EXIT</button>
            </div>
        </div>

        <div id="auth-panel" class="panel">
            <h3>AUTHENTICATION_REQUIRED</h3>
            <p style="color: var(--color-error);">SECURE CONNECTION ESTABLISHED. VERIFYING TOKEN...</p>
        </div>

        <div id="admin-dashboard" class="hidden">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <!-- Ban Tools -->
                <div class="panel">
                    <h3>PUNITIVE_MEASURES (BAN)</h3>
                    <div class="form-group">
                        <label>TARGET_ID (Username/IP)</label>
                        <input type="text" id="ban-target" placeholder="Target...">
                    </div>
                    <div class="form-group">
                        <label>REASON</label>
                        <input type="text" id="ban-reason" value="Violation of TOS">
                    </div>
                    <div class="form-group">
                        <label>DURATION (DAYS)</label>
                        <input type="number" id="ban-duration" value="7">
                    </div>
                    <button class="btn" style="border-color: var(--color-error); color: var(--color-error);"
                        onclick="AdminApp.banUser()">[EXECUTE]</button>
                </div>

                <!-- Stats / Info -->
                <div class="panel">
                    <h3>SYSTEM_METRICS</h3>
                    <p>SERVER_STATUS: <span style="color: var(--color-primary);">ONLINE</span></p>
                    <p>API_LATENCY: <span id="ping">...</span> ms</p>
                </div>

                <!-- Promotion Tools -->
                <div class="panel">
                    <h3>ELEVATE_PRIVILEGES</h3>
                    <div class="form-group">
                        <label>TARGET_OPERATOR_ID</label>
                        <input type="text" id="promote-target" placeholder="Username...">
                    </div>
                    <button class="btn" style="border-color: var(--color-primary); color: var(--color-primary);"
                        onclick="AdminApp.promoteUser()">[GRANT_ROOT_ACCESS]</button>
                </div>
            </div>

            <div class="panel" style="margin-top: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>ACTIVE_BLOCKLIST</h3>
                    <button class="btn btn-secondary" onclick="AdminApp.loadBans()">[REFRESH]</button>
                </div>
                <div id="ban-list" style="margin-top: 1rem; max-height: 400px; overflow-y: auto;">
                    <!-- Table inject -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>

</html>
